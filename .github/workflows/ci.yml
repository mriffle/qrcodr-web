name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; the build/deploy jobs widen their own scope.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR runs, but never kill an in-flight main run (which may
  # be mid-deploy). The deploy job additionally serializes on the `pages` group.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Parallel test + build jobs (fan-out) ──────────────────────────────────
  check:
    name: Static + unit + scannability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # format + lint + typecheck + unit/scannability. The gated OpenCV/WeChat
      # test self-skips here (no venv) — it runs in the `decoders` job.
      - run: npm run check
      # Fail if the committed docs/TEST-REPORT.md is stale.
      - run: npm run report:check

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      # Don't let one browser's failure cancel the others — we want all three
      # signals. deploy still needs every leg to pass.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      # chromium runs the full suite; firefox/webkit run only the canvas-path
      # subset (config `grep: /PNG/`).
      - run: npm run test:e2e -- --project=${{ matrix.browser }}

  decoders:
    name: Real-platform decoders (OpenCV + WeChat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/decoders/requirements.txt
      - run: npm ci
      - run: npm run setup:decoders:py
      - run: npm run test:decoders:py
      - name: Publish field-robustness numbers to the run summary
        if: always()
        run: npm run report:metrics --silent >> "$GITHUB_STEP_SUMMARY" || true

  apple-vision:
    name: Apple Vision (real iOS decoder)
    # macOS runner: Vision.framework + the Swift toolchain ship with Xcode.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:vision:apple

  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Disable Jekyll
        run: touch dist/.nojekyll
      # Artifact steps need `pages: write`, which fork PRs don't grant — and
      # PRs don't deploy anyway. PRs still run `npm run build` above as a
      # compile check; only non-PR runs produce/upload the Pages artifact.
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      # Surface the committed report on every run.
      - name: Publish test report to the run summary
        if: always()
        run: cat docs/TEST-REPORT.md >> "$GITHUB_STEP_SUMMARY" || true

  # ── Gated deploy (fan-in) ─────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [check, e2e, decoders, apple-vision, build]
    # Only deploy from main (push or manual dispatch) — never from a PR.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
